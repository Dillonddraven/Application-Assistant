# profile/companies.yaml — USER-EDITABLE.
#
# Curated company watchlist for `job-apply finder run`. Each company has:
#   - name: human-readable label
#   - ats: one of {greenhouse, lever}  (more sources later: ashby, workable, smartrecruiters)
#   - slug: the company's identifier on that ATS (e.g. boards-api.greenhouse.io/v1/boards/<slug>/jobs)
#   - tags: optional list of cyber-relevance markers (used to weight discoveries)
#
# Copy this to profile/companies.yaml and curate to taste. The system polls
# only the companies you list. Recommendation: start with 30-50 mid-size cyber
# companies whose stack you'd genuinely consider. Add/remove freely.

