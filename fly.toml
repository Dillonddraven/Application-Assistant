# fly.io app config. Deploy with:
#   fly launch --no-deploy           # creates the app on first run
#   fly secrets set OPENAI_API_KEY=sk-... LLM_PROVIDER=openai
#   fly volumes create job_apply_data --size 1
#   fly deploy
#
# See README.md "Deploy the web UI" section.

app = "job-apply-assistant"
primary_region = "ord"

[build]

[[services]]
  internal_port = 8501
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.tcp_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"

[[mounts]]
  source = "job_apply_data"
  destination = "/app/profile"
